<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    #game-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
    }

    /* Lock message */
    #lock-msg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: 'Courier New', monospace;
      z-index: 200;
      cursor: pointer;
    }
    #lock-msg h1 {
      font-size: 48px;
      font-weight: bold;
      text-shadow: 4px 4px 0 #3a3a00, -2px 2px 0 #3a3a00;
      color: #ffff55;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }
    #lock-msg h1 span {
      color: #55ff55;
    }
    #lock-msg p {
      font-size: 18px;
      color: #aaa;
      margin-bottom: 8px;
      text-shadow: 1px 1px 0 #000;
    }
    #lock-msg .controls-grid {
      display: grid;
      grid-template-columns: auto auto;
      gap: 4px 24px;
      margin: 16px 0;
      text-align: left;
      font-size: 14px;
      color: #ccc;
    }
    #lock-msg .controls-grid .key {
      color: #fff;
      background: #444;
      padding: 2px 8px;
      border-radius: 3px;
      border-bottom: 2px solid #222;
      font-size: 12px;
      display: inline-block;
    }
    #lock-msg .click-btn {
      margin-top: 20px;
      padding: 12px 32px;
      background: #5a9e5a;
      border: 3px solid #4a8e4a;
      border-bottom: 4px solid #2a6e2a;
      color: white;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      text-shadow: 1px 1px 0 #000;
      image-rendering: pixelated;
    }
    #lock-msg .click-btn:hover { background: #6aae6a; }
    #lock-msg .click-btn:active { border-bottom-width: 2px; transform: translateY(2px); }
    #lock-msg .version { font-size: 11px; color: #666; margin-top: 12px; }

    /* Loading */
    #loading {
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: 'Courier New', monospace;
      z-index: 300;
    }
    #loading h2 { font-size: 32px; color: #ffff55; margin-bottom: 16px; text-shadow: 2px 2px 0 #333; }
    #loading p { color: #aaa; margin-bottom: 24px; }
    #loading-bar-outer { width: 300px; height: 20px; background: #333; border: 2px solid #555; }
    #loading-bar { height: 100%; background: #5da; width: 0%; transition: width 0.3s; }
  </style>
</head>
<body>

<div id="loading">
  <h2>Minecraft</h2>
  <p>Generating world...</p>
  <div id="loading-bar-outer"><div id="loading-bar"></div></div>
</div>

<canvas id="game-canvas"></canvas>

<div id="lock-msg" style="display:none;">
  <h1>MINE<span>CRAFT</span></h1>
  <p>Click to play</p>
  <div class="controls-grid">
    <div><span class="key">W A S D</span> Move</div>
    <div><span class="key">Mouse</span> Look</div>
    <div><span class="key">Space</span> Jump</div>
    <div><span class="key">LMB Hold</span> Break block</div>
    <div><span class="key">Ctrl</span> Sprint</div>
    <div><span class="key">RMB</span> Place block</div>
    <div><span class="key">Shift</span> Sneak</div>
    <div><span class="key">1-9 / Scroll</span> Hotbar</div>
    <div><span class="key">E</span> Inventory</div>
    <div><span class="key">F3</span> Debug info</div>
  </div>
  <button class="click-btn" onclick="document.getElementById('game-canvas').requestPointerLock()">
    ▶ PLAY
  </button>
  <p class="version">Minecraft Web Clone v1.0</p>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
  // Loading progress simulation
  const bar = document.getElementById('loading-bar');
  let progress = 0;
  const barInterval = setInterval(() => {
    progress = Math.min(progress + Math.random() * 8, 85);
    bar.style.width = progress + '%';
  }, 150);

  try {
    const { Game } = await import('./src/game.js');
    const game = new Game();

    clearInterval(barInterval);
    bar.style.width = '100%';
    await new Promise(r => setTimeout(r, 300));

    document.getElementById('loading').style.display = 'none';
    document.getElementById('lock-msg').style.display = 'flex';

    await game.init();
    game.loop();

    // After init, hide loading show lock-msg (already done above)
  } catch(err) {
    document.getElementById('loading').innerHTML = `
      <h2 style="color:#ff4444">Error Loading Game</h2>
      <p style="color:#aaa;max-width:500px;text-align:center;">${err.message}</p>
      <pre style="color:#888;font-size:10px;margin-top:12px;max-width:600px;overflow:auto;">${err.stack}</pre>
    `;
    console.error(err);
  }
</script>
</body>
</html>
